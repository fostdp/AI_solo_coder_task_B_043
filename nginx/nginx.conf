worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # 日志格式（带响应时间）
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # 发送文件优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # 连接超时
    keepalive_timeout 65;
    client_max_body_size 10M;

    # =========================================
    # Gzip 压缩配置
    # =========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;           # 压缩级别 1-9，6 是速度和压缩率的最佳平衡
    gzip_buffers 16 8k;
    gzip_http_version 1.1;

    # 压缩的 MIME 类型
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/vnd.api+json
        image/svg+xml
        font/ttf
        font/otf
        font/woff2;

    gzip_min_length 1024;        # 小于 1KB 不压缩
    gzip_disable "msie6";        # IE6 不支持 gzip

    # =========================================
    # 前端静态资源缓存策略
    # =========================================
    # HTML: 不缓存（每次协商）
    map $request_uri $cache_control {
        ~* \.html$              "no-cache, no-store, must-revalidate";
        ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ "public, max-age=31536000, immutable"; # 1年
        default                 "public, max-age=600"; # 默认 10 分钟
    }

    # =========================================
    # 虚拟主机：80 端口
    # =========================================
    server {
        listen 80;
        server_name _;

        # 健康检查
        location = /healthz {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # =========================================
        # 前端静态资源（已 build 的文件）
        # =========================================
        location / {
            alias /usr/share/nginx/html/;
            index index.html;
            try_files $uri $uri/ /index.html;

            # 缓存策略
            add_header Cache-Control $cache_control always;
            add_header X-Content-Type-Options nosniff;
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-XSS-Protection "1; mode=block";

            # 开启 brotli/gzip 静态文件支持（如果 .gz 文件存在直接返回）
            gzip_static on;
        }

        # =========================================
        # API 反向代理到 Go 后端
        # =========================================
        location /api/ {
            proxy_pass http://backend:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # 缓冲区
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # WebSocket 支持（如果需要）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # =========================================
        # /frontend 路径也代理到静态资源（兼容旧链接）
        # =========================================
        location /frontend/ {
            alias /usr/share/nginx/html/;
            add_header Cache-Control $cache_control always;
        }

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
        }
    }

    # =========================================
    # 内部监控端口（不对外暴露）
    # =========================================
    server {
        listen 8081;
        server_name _;

        # Nginx 状态（Prometheus 可抓取）
        location = /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;
        }
    }
}
