<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古代金属冶炼遗址污染指纹识别与现代环境修复系统</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-title">
                <span class="logo-icon">⚒️</span>
                <h1>古代金属冶炼遗址污染指纹识别与环境修复系统</h1>
            </div>
            <div class="header-stats" id="headerStats">
                <div class="stat-item"><span class="stat-label">遗址总数</span><span class="stat-value" id="totalSites">0</span></div>
                <div class="stat-item"><span class="stat-label">已监测</span><span class="stat-value" id="sitesWithData">0</span></div>
                <div class="stat-item"><span class="stat-label">严重污染</span><span class="stat-value severe" id="severeCount">0</span></div>
                <div class="stat-item"><span class="stat-label">活跃告警</span><span class="stat-value warning" id="alertCount">0</span></div>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>🗺️ 图层控制</h3>
                    <div class="layer-controls">
                        <label><input type="checkbox" id="showAll" checked> 显示全部遗址</label>
                        <label><input type="checkbox" id="filterCu"> 铜冶炼遗址</label>
                        <label><input type="checkbox" id="filterFe"> 铁冶炼遗址</label>
                        <label><input type="checkbox" id="filterAg"> 银冶炼遗址</label>
                        <label><input type="checkbox" id="filterPb"> 铅冶炼遗址</label>
                        <label><input type="checkbox" id="filterHg"> 汞冶炼遗址</label>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>🎨 图例说明</h3>
                    <div class="legend">
                        <div class="legend-title">污染程度（颜色）</div>
                        <div class="legend-item"><span class="legend-color" style="background:#1b7a34"></span>清洁 (PI&lt;1)</div>
                        <div class="legend-item"><span class="legend-color" style="background:#8bc34a"></span>轻度 (1≤PI&lt;2)</div>
                        <div class="legend-item"><span class="legend-color" style="background:#ffeb3b"></span>中度 (2≤PI&lt;3)</div>
                        <div class="legend-item"><span class="legend-color" style="background:#ff9800"></span>重度 (3≤PI&lt;5)</div>
                        <div class="legend-item"><span class="legend-color" style="background:#f44336"></span>严重 (PI≥5)</div>
                        <div class="legend-item"><span class="legend-color" style="background:#9e9e9e"></span>暂无数据</div>
                    </div>
                    <div class="legend">
                        <div class="legend-title">冶炼规模（大小）</div>
                        <div class="legend-item"><span class="legend-circle" style="width:8px;height:8px"></span>小型</div>
                        <div class="legend-item"><span class="legend-circle" style="width:14px;height:14px"></span>中型</div>
                        <div class="legend-item"><span class="legend-circle" style="width:20px;height:20px"></span>大型</div>
                        <div class="legend-item"><span class="legend-circle" style="width:28px;height:28px"></span>超大型</div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>⚡ 最新告警</h3>
                    <div class="alert-list" id="alertList">
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </aside>

            <div class="map-container">
                <div id="map"></div>
                <canvas id="siteCanvas" class="site-canvas"></canvas>
                <div class="map-controls">
                    <button class="control-btn" onclick="resetMapView()">🌍 重置视图</button>
                    <button class="control-btn" onclick="refreshData()">🔄 刷新数据</button>
                    <button class="control-btn accent" onclick="openTimelineModal()">📜 冶炼史时间线</button>
                </div>
            </div>

            <!-- 时间线对比模态框 -->
            <div class="timeline-modal" id="timelineModal" style="display:none;">
                <div class="timeline-modal-content">
                    <div class="timeline-modal-header">
                        <h2>📜 全球冶炼史时间线对比</h2>
                        <button class="close-btn" onclick="closeTimelineModal()">✕</button>
                    </div>
                    <div class="timeline-modal-body">
                        <div class="timeline-controls">
                            <label>选择遗址：</label>
                            <select id="timelineSiteSelect" multiple size="5"></select>
                            <button class="control-btn" onclick="loadTimelineData()">加载对比</button>
                            <button class="control-btn" onclick="toggleTimelineAnimation()">▶ 播放动画</button>
                        </div>
                        <canvas id="timelineCanvas" width="900" height="400"></canvas>
                        <div id="timelineEpochInfo" class="epoch-info"></div>
                    </div>
                </div>
            </div>

            <aside class="detail-panel" id="detailPanel">
                <div class="panel-placeholder" id="panelPlaceholder">
                    <div class="placeholder-icon">📍</div>
                    <p>点击地图上的遗址标记查看详细信息</p>
                </div>
                <div class="panel-content" id="panelContent" style="display:none;">
                    <button class="close-btn" onclick="closePanel()">✕</button>
                    <div class="site-header" id="siteHeader"></div>
                    <div class="tabs">
                        <button class="tab active" data-tab="trend" onclick="switchTab('trend')">📈 浓度趋势</button>
                        <button class="tab" data-tab="fingerprint" onclick="switchTab('fingerprint')">🔬 污染指纹</button>
                        <button class="tab" data-tab="remediation" onclick="switchTab('remediation')">🏗️ 修复方案</button>
                        <button class="tab" data-tab="smelting" onclick="switchTab('smelting')">🔥 工艺反演</button>
                        <button class="tab" data-tab="farmsafety" onclick="switchTab('farmsafety')">🌾 农田安全</button>
                        <button class="tab" data-tab="slag" onclick="switchTab('slag')">♻️ 矿渣利用</button>
                    </div>
                    <div class="tab-content">
                        <div class="tab-pane active" id="tab-trend">
                            <div class="trend-summary" id="trendSummary"></div>
                            <canvas id="trendChart" width="400" height="250"></canvas>
                            <div class="metal-legend" id="metalLegend"></div>
                        </div>
                        <div class="tab-pane" id="tab-fingerprint">
                            <div id="fingerprintContent"></div>
                        </div>
                        <div class="tab-pane" id="tab-remediation">
                            <div id="remediationContent"></div>
                        </div>
                        <div class="tab-pane" id="tab-smelting">
                            <div id="smeltingContent"></div>
                        </div>
                        <div class="tab-pane" id="tab-farmsafety">
                            <div id="farmsafetyContent"></div>
                        </div>
                        <div class="tab-pane" id="tab-slag">
                            <div id="slagContent"></div>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="pollution_map.js"></script>
    <script src="site_detail.js"></script>
    <script src="smelting_process.js"></script>
    <script src="farm_safety.js"></script>
    <script src="slag_recycle.js"></script>
    <script src="timeline_compare.js"></script>
    <script src="app.js"></script>
</body>
</html>
